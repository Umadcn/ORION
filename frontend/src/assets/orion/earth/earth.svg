<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Night-side Earth with city lights">
  <defs>
    <radialGradient id="globe" cx="38%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#0f2f4d" />
      <stop offset="45%" stop-color="#0a1f38" />
      <stop offset="80%" stop-color="#050e1c" />
      <stop offset="100%" stop-color="#02060e" />
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="82%" stop-color="rgba(56,150,230,0)" />
      <stop offset="94%" stop-color="rgba(66,170,255,0.55)" />
      <stop offset="100%" stop-color="rgba(120,200,255,0.05)" />
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ec8ff" />
      <stop offset="55%" stop-color="#2b6fb0" />
      <stop offset="100%" stop-color="#0a2036" />
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="3" /></filter>
    <clipPath id="disc"><circle cx="300" cy="300" r="250" /></clipPath>
  </defs>

  <!-- Atmospheric halo -->
  <circle cx="300" cy="300" r="285" fill="url(#atmo)" />
  <!-- Bright rim -->
  <circle cx="300" cy="300" r="252" fill="none" stroke="url(#rim)" stroke-width="4" opacity="0.85" />
  <!-- Globe -->
  <circle cx="300" cy="300" r="250" fill="url(#globe)" />

  <g clip-path="url(#disc)">
    <!-- Landmass hints (dark teal continents) -->
    <g fill="#0c3a44" opacity="0.5" filter="url(#soft)">
      <path d="M120 180 q60 -30 120 10 q40 30 20 80 q-30 50 -110 40 q-70 -10 -70 -70 q0 -40 40 -60Z" />
      <path d="M300 360 q60 -20 110 20 q30 40 -10 80 q-60 40 -120 10 q-40 -40 20 -110Z" />
      <path d="M360 150 q50 0 70 40 q10 40 -30 60 q-50 10 -70 -30 q-10 -50 30 -70Z" />
    </g>

    <!-- City lights clustered over the lit landmass (warm orange) -->
    <g fill="#ffb552">
      <g opacity="0.95">
        <circle cx="150" cy="210" r="2.4"/><circle cx="165" cy="220" r="1.8"/><circle cx="140" cy="230" r="1.6"/>
        <circle cx="180" cy="205" r="2.1"/><circle cx="200" cy="225" r="2.6"/><circle cx="175" cy="245" r="1.7"/>
        <circle cx="210" cy="250" r="2.0"/><circle cx="160" cy="260" r="2.3"/><circle cx="195" cy="270" r="1.6"/>
        <circle cx="130" cy="250" r="1.9"/><circle cx="220" cy="210" r="1.7"/><circle cx="235" cy="235" r="2.2"/>
        <circle cx="120" cy="200" r="1.5"/><circle cx="188" cy="288" r="1.8"/><circle cx="210" cy="290" r="1.5"/>
      </g>
      <g opacity="0.8">
        <circle cx="250" cy="200" r="1.6"/><circle cx="270" cy="220" r="2.0"/><circle cx="255" cy="250" r="1.5"/>
        <circle cx="285" cy="240" r="1.7"/><circle cx="300" cy="215" r="1.4"/><circle cx="315" cy="260" r="1.9"/>
        <circle cx="330" cy="180" r="1.6"/><circle cx="345" cy="205" r="2.1"/><circle cx="360" cy="230" r="1.5"/>
        <circle cx="380" cy="200" r="1.7"/><circle cx="395" cy="175" r="1.5"/><circle cx="340" cy="250" r="1.6"/>
      </g>
      <g opacity="0.7">
        <circle cx="300" cy="380" r="1.7"/><circle cx="330" cy="400" r="2.0"/><circle cx="360" cy="390" r="1.6"/>
        <circle cx="345" cy="420" r="1.5"/><circle cx="380" cy="410" r="1.8"/><circle cx="315" cy="410" r="1.4"/>
      </g>
    </g>

    <!-- Faint cloud swirls -->
    <g fill="#dbeeff" opacity="0.10" filter="url(#soft)">
      <path d="M90 300 q120 -40 240 -10 q80 20 160 -10 q-60 60 -180 50 q-140 -10 -220 -30Z" />
      <path d="M140 380 q120 30 260 5 q-80 50 -200 30 q-60 -10 -60 -35Z" />
    </g>

    <!-- Terminator shadow toward the right/bottom -->
    <circle cx="430" cy="380" r="300" fill="#02060e" opacity="0.55" filter="url(#soft)" />
  </g>
</svg>
